<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 16 - Calculadora Básica</title>
    <link rel="stylesheet" href="css/ejercicio16.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="contenedor">
        <h2>Calculadora de Números</h2>
        
        <div class="formulario">
            <div class="grupo-campo">
                <label>Primer Número:</label>
                <input type="text" id="numero1" placeholder="Ej. 10">
            </div>
            
            <div class="grupo-campo">
                <label>Segundo Número:</label>
                <input type="text" id="numero2" placeholder="Ej. 5">
            </div>
            
            <div class="zona-botones">
                <button type="button" class="btn" onclick="calcularOperacion('suma')">+</button>
                <button type="button" class="btn" onclick="calcularOperacion('resta')">-</button>
                <button type="button" class="btn" onclick="calcularOperacion('multiplicacion')">×</button>
                <button type="button" class="btn" onclick="calcularOperacion('division')">÷</button>
            </div>
        </div>

        <hr>

        <div class="grupo-resultado">
            <label>Resultado:</label>
            <input type="text" id="resultado" readonly>
        </div>
    </div>

    <script src="js/ejercicio16.js"></script>
</body>
</html>
