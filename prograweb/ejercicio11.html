<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conversor de Kilometros a millas</title>
    <link rel="stylesheet" href="css/ejercicio11.css">
</head>
<body>

    <div class="contenedor-calculadora">
        <h3>Conversor de Kilometros a millas </h3>
        
        <div class="campo">
            <label>Kilometros (km):</label>
            <input type="text" id="kilometros" placeholder="Ej: 25km">
        </div>

        <button onclick="convertir()">Convertir</button>

        <div class="campo">
            <label>Millas (mi):</label>
            <input type="text" id="millas" readonly>
        </div>
    </div>

    <script src="js/ejercicio11.js"></script>
</body>
</html>
