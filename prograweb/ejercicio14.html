<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de numero mayor,menor y promedio</title>
    <link rel="stylesheet" href="css/ejercicio14.css">
</head>
<body>

    <div class="contenedor-calculadora">
        <h3>Calculadora de numero mayor,menor y promedio</h3>
        
        <div class="form-group">
            <label>Numeros con comas:</label>
            <input type="text" id="inputNumeros" placeholder="Ej: 5, 10 , 25, etc">
        </div>
        
        

        <button onclick="convertir()">Calcular</button>

        <div class="results-section">
        <div class="form-group">
            <label for="txtMayor">Número Mayor:</label>
            <input type="text" id="txtMayor" readonly placeholder="-">
        </div>

        <div class="form-group">
            <label for="txtMenor">Número Menor:</label>
            <input type="text" id="txtMenor" readonly placeholder="-">
        </div>

        <div class="form-group">
            <label for="txtPromedio">Promedio:</label>
            <input type="text" id="txtPromedio" readonly placeholder="-">
        </div>
    </div>
</div>

    <script src="js/ejercicio14.js"></script>
</body>
</html>
