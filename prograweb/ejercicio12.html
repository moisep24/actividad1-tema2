<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conversor de pesos a dólares</title>
    <link rel="stylesheet" href="css/ejercicio11.css">
</head>
<body>

    <div class="contenedor-calculadora">
        <h3>Conversor de Pesos a Dólares</h3>
        
        <div class="campo">
            <label>Pesos (ARS):</label>
            <input type="text" id="pesos" placeholder="Ej: 1000">
        </div>

        <button onclick="convertir()">Convertir</button>

        <div class="campo">
            <label>Dólares (USD):</label>
            <input type="text" id="dolares" readonly>
        </div>
    </div>

    <script src="js/ejercicio12.js"></script>
</body>
</html>
