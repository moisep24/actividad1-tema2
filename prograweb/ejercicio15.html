<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 15 - Control de Estudiantes</title>
    <link rel="stylesheet" href="css/ejercicio15.css">
</head>
<body>

    <div class="contenedor">
        <h2>Registro de Estudiantes</h2>
        
        <div class="formulario">
            <div class="grupo-campo">
                <label>Nombre del Estudiante:</label>
                <input type="text" id="input-nombre" placeholder="Ej. Juan">
            </div>
            
            <div class="grupo-campo">
                <label>Calificación:</label>
                <input type="number" id="input-calificacion" placeholder="Ej. 85" min="0" max="100">
            </div>
            
            <div class="zona-botones">
                <button type="button" class="btn btn-agregar" onclick="agregarEstudiante()">Agregar estudiante</button>
                <button type="button" class="btn btn-calcular" onclick="calcularResultados()">Calcular</button>
            </div>
        </div>

        <h3>Estudiantes registrados (<span id="total-lista">0</span>)</h3>
        <ul id="lista-estudiantes"></ul>

        <hr>

        <h3>Resultados del Análisis</h3>
        
        <div class="grupo-resultado">
            <label>Calificación promedio:</label>
            <input type="text" id="resultado-promedio" readonly>
        </div>
        
        <div class="grupo-resultado">
            <label>Calificación más alta:</label>
            <input type="text" id="resultado-alta" readonly>
        </div>
        
        <div class="grupo-resultado">
            <label>Calificación más baja:</label>
            <input type="text" id="resultado-baja" readonly>
        </div>
    </div>

    <script src="js/ejercicio15.js"></script>
</body>
</html>
