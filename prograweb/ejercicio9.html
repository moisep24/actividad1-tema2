<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | DevSolutions</title>
<link rel="stylesheet" href="css/ejercicio9.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="contenedor-formulario">
        <h1>Contáctanos</h1>
        <p class="subtitulo">¿Tienes dudas? Escribenos y te respondemos en 24h.</p>
        <form class="formulario">
            <!-- Grupo 1: Datos basicos-->
            <div class="grupo-formulario">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" placeholder="nombre" required>
            </div>
            <!-- Grupo 2: Correo electronico y telefono -->
             <div class="grupo-doble">
                <div class="grupo-formulario">
                    <label for="correo">Correo Electronico:</label>
                    <input type="email" id="correo" placeholder="correo@ejemplo.com" required>

             </div>
             <div class="grupo-formulario">
                <label for="telefono">Telefono:<span>(Opcional)</span></label>
                <input type="tel" id="telefono" placeholder="(123) 456-7890" required>
                </div>
                </div>
            <!-- Grupo 3: Mensaje -->
            <div class="grupo-formulario">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" rows="5" placeholder="Escribe tu mensaje o consulta aqui..." required></textarea>
            </div>
            <!-- Grupo 4: Boton de envio --> 
             <button type="submit" class="boton-enviar">Enviar Mensaje <span>→</span>

             </button>   

        </form>
        </div>  
        |
    
    
</body>
</html>
